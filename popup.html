<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:400px;background:#09090b;color:#fafafa;font-family:-apple-system,sans-serif;max-height:540px;overflow-y:auto}
body::-webkit-scrollbar{width:3px}
body::-webkit-scrollbar-thumb{background:#27272a;border-radius:2px}
.hd{padding:14px 18px 10px;display:flex;align-items:center;gap:10px}
.lg{width:30px;height:30px;background:#6366f1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff}
.hd h1{font-size:17px;font-weight:800}
.sb{padding:0 18px 12px}
.sb input{width:100%;background:#18181b;border:2px solid #27272a;border-radius:11px;padding:11px 15px;color:#fafafa;font-size:14px;outline:none}
.sb input:focus{border-color:#6366f1}
.sb input::placeholder{color:#52525b}
.ms{padding:0 18px 12px;display:flex;gap:5px}
.mb{flex:1;padding:9px 6px;border-radius:9px;border:1.5px solid #27272a;background:#18181b;color:#a1a1aa;font-size:11px;font-weight:600;cursor:pointer;text-align:center}
.mb:hover{border-color:#6366f1;color:#fafafa}
.mb.on{border-color:#6366f1;background:rgba(99,102,241,0.12);color:#818cf8}
.ml{display:block;font-size:9px;color:#52525b;margin-top:1px;font-weight:400}
.st{padding:36px 24px;text-align:center}
.si{font-size:34px;margin-bottom:8px}
.sm{font-size:13px;font-weight:600;margin-bottom:4px}
.ss{font-size:11px;color:#52525b;line-height:1.5}
.sp{width:30px;height:30px;border:3px solid #27272a;border-top-color:#6366f1;border-radius:50%;margin:0 auto 12px;animation:sp 0.7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.kf{padding:4px 18px 14px}
.kf label{display:block;font-size:10px;font-weight:600;color:#a1a1aa;margin:8px 0 4px}
.kf input{width:100%;background:#18181b;border:1px solid #27272a;border-radius:7px;padding:9px 11px;color:#fafafa;font-size:12px;outline:none}
.kf input:focus{border-color:#6366f1}
.ks{width:100%;background:#6366f1;color:#fff;border:none;padding:11px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;margin-top:12px}
.ks:hover{background:#818cf8}
.km{text-align:center;padding:6px;margin-top:6px;border-radius:7px;font-size:11px;font-weight:600}
.km.ok{background:rgba(34,197,94,0.12);color:#22c55e}
.km.er{background:rgba(239,68,68,0.12);color:#ef4444}
.ka{display:block;text-align:center;color:#818cf8;font-size:10px;text-decoration:none;margin-top:8px}

.gb{margin:0 18px 10px;padding:13px 15px;border-radius:13px;background:linear-gradient(135deg,#22c55e,#16a34a);cursor:pointer;transition:all 0.15s;display:none;position:relative}
.gb:hover{transform:scale(1.01);box-shadow:0 8px 24px rgba(34,197,94,0.3)}
.gt{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.gg{font-size:9px;font-weight:700;background:rgba(255,255,255,0.2);padding:2px 7px;border-radius:5px;color:#fff;text-transform:uppercase;letter-spacing:0.5px}
.gp{font-size:21px;font-weight:900;color:#fff}
.gn{font-size:11px;color:rgba(255,255,255,0.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gm{font-size:10px;color:rgba(255,255,255,0.6);margin-top:3px}
.ga{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:22px;color:rgba(255,255,255,0.6)}
.ol{padding:5px 18px;font-size:9px;font-weight:600;color:#52525b;text-transform:uppercase;letter-spacing:0.5px;display:none}
.os{padding:0 18px 12px}
.oi{display:flex;align-items:center;gap:9px;padding:9px;margin-bottom:4px;background:#18181b;border:1px solid #27272a;border-radius:9px;cursor:pointer;transition:all 0.15s;text-decoration:none;color:inherit}
.oi:hover{border-color:#6366f1;transform:translateX(2px)}
.om{width:34px;height:34px;border-radius:7px;object-fit:cover;background:#27272a;flex-shrink:0}
.of{flex:1;min-width:0}
.ot{font-size:10px;color:#a1a1aa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.od{font-size:9px;color:#52525b;margin-top:1px}
.op{font-size:13px;font-weight:800;flex-shrink:0}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.an{animation:su 0.25s ease-out forwards;opacity:0}
</style>
</head>
<body>
<div class="hd"><div class="lg">GO</div><h1>SSADA</h1></div>
<div class="sb"><input type="text" id="q" placeholder="&#xBB50; &#xCC3E;&#xC73C;&#xC138;&#xC694;? (ex: &#xC5D0;&#xC5B4;&#xD31F; &#xD504;&#xB85C; 2)" autofocus/></div>
<div class="ms">
<button class="mb on" data-m="balanced">&#x1F3AF; &#xCD94;&#xCC9C;<span class="ml">&#xC2E0;&#xB8B0;+&#xAC00;&#xACA9;</span></button>
<button class="mb" data-m="cheapest">&#x1F4B0; &#xCD5C;&#xC800;&#xAC00;<span class="ml">&#xBB34;&#xC870;&#xAC74; &#xC2FC;</span></button>
<button class="mb" data-m="trusted">&#x1F6E1; &#xC815;&#xD488;<span class="ml">&#xB300;&#xD615;&#xBAB0;</span></button>
</div>

<div id="v_init" class="st"><div class="si">&#x1F50D;</div><p class="ss">&#xC0C1;&#xD488;&#xBA85; &#xC785;&#xB825; &#x2192; &#xCD5C;&#xC800;&#xAC00;&#xB85C; GO</p></div>
<div id="v_load" class="st" style="display:none"><div class="sp"></div><p class="sm">&#xCC3E;&#xB294; &#xC911;...</p></div>
<div id="v_err" class="st" style="display:none"><div class="si">&#x26A0;</div><p class="sm" id="emsg">err</p></div>
<div id="v_none" class="st" style="display:none"><div class="si">&#x1F614;</div><p class="sm">&#xAC80;&#xC0C9; &#xACB0;&#xACFC; &#xC5C6;&#xC74C;</p></div>

<div id="v_key" style="display:none">
<div class="st"><div class="si">&#x1F511;</div><p class="sm">Naver API Key &#xD544;&#xC694;</p><p class="ss">&#xBB34;&#xB8CC; 1&#xBD84; &#xBC1C;&#xAE09;</p></div>
<div class="kf">
<label>Client ID</label><input type="text" id="kid" placeholder="Client ID"/>
<label>Client Secret</label><input type="text" id="ksec" placeholder="Client Secret"/>
<button class="ks" id="ksave">&#xC800;&#xC7A5;</button>
<div id="kmsg" style="display:none"></div>
<a class="ka" href="https://developers.naver.com/apps/#/register?api=search" target="_blank">&#xB124;&#xC774;&#xBC84; &#xAC1C;&#xBC1C;&#xC790;&#xC13C;&#xD130; &#xBC1C;&#xAE09; &rarr;</a>
</div>
</div>

<div id="gb" class="gb"></div>
<div id="ol" class="ol">&#xB2E4;&#xB978; &#xC635;&#xC158;</div>
<div id="os" class="os"></div>

<script>
var mode="balanced";
var views=["v_init","v_load","v_err","v_none","v_key"];

function show(id){
  views.forEach(function(v){document.getElementById(v).style.display="none";});
  document.getElementById("gb").style.display="none";
  document.getElementById("ol").style.display="none";
  document.getElementById("os").innerHTML="";
  if(id)document.getElementById(id).style.display="";
}

function fmt(n){return n.toLocaleString("ko-KR")+"원";}

document.querySelectorAll(".mb").forEach(function(b){
  b.onclick=function(){
    document.querySelectorAll(".mb").forEach(function(x){x.classList.remove("on");});
    b.classList.add("on");
    mode=b.getAttribute("data-m");
    var q=document.getElementById("q").value.trim();
    if(q)go(q);
  };
});

document.getElementById("q").onkeydown=function(e){
  if(e.key==="Enter"){var q=this.value.trim();if(q)go(q);}
};

document.getElementById("ksave").onclick=function(){
  var id=document.getElementById("kid").value.trim();
  var sec=document.getElementById("ksec").value.trim();
  var msg=document.getElementById("kmsg");
  if(!id||!sec){
    msg.style.display="block";msg.className="km er";msg.textContent="ID와 Secret 모두 입력해주세요";
    return;
  }
  chrome.runtime.sendMessage({action:"saveKey",id:id,secret:sec},function(r){
    if(r&&r.success){
      msg.style.display="block";msg.className="km ok";msg.textContent="저장 완료! 이제 검색해보세요";
      show("v_init");
    }else{
      msg.style.display="block";msg.className="km er";
      msg.textContent="저장 실패: "+(r?r.error:"unknown");
    }
  });
};

function go(query){
  show("v_load");
  chrome.runtime.sendMessage({action:"search",query:query,mode:mode},function(r){
    if(chrome.runtime.lastError){show("v_err");document.getElementById("emsg").textContent="Extension error";return;}
    if(!r||!r.success){
      if(r&&r.error==="API_KEY_MISSING"){show("v_key");return;}
      show("v_err");document.getElementById("emsg").textContent=r?r.error:"error";return;
    }
    if(r.results.length===0){show("v_none");return;}
    render(r.results);
  });
}

function render(results){
  views.forEach(function(v){document.getElementById(v).style.display="none";});
  var best=results[0];
  var tag=mode==="cheapest"?"최저가":mode==="trusted"?"정품":"추천";
  var b=document.getElementById("gb");
  b.innerHTML='<div class="gt"><span class="gg">'+tag+' #1</span><span class="gp">'+fmt(best.price)+'</span></div>'+
    '<div class="gn">'+best.title+'</div><div class="gm">'+best.mall+'</div><div class="ga">&rarr;</div>';
  b.style.display="block";b.className="gb an";
  b.onclick=function(){chrome.tabs.create({url:best.link});};

  var rest=results.slice(1);
  if(rest.length>0){
    document.getElementById("ol").style.display="block";
    var c=document.getElementById("os");c.innerHTML="";
    rest.forEach(function(item,i){
      var a=document.createElement("a");a.href="#";
      a.className="oi an";a.style.animationDelay=(i+1)*0.06+"s";
      a.onclick=function(e){e.preventDefault();chrome.tabs.create({url:item.link});};
      a.innerHTML='<img class="om" src="'+(item.image||"")+'" onerror="this.style.display='none'"/>'+
        '<div class="of"><div class="ot">'+item.title+'</div><div class="od">'+item.mall+'</div></div>'+
        '<div class="op">'+fmt(item.price)+'</div>';
      c.appendChild(a);
    });
  }
}

// init: check key
chrome.runtime.sendMessage({action:"getKey"},function(d){
  if(!d||!d.naverClientId||!d.naverClientSecret){show("v_key");}
});
</script>
</body>
</html>
