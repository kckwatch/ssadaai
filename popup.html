<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SSADA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--bg2:#18181b;--bg3:#27272a;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--text:#fafafa;--text2:#a1a1aa;--text3:#52525b;--border:#3f3f46;--gold:#f59e0b}
body{width:400px;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
body.has-results{overflow-y:auto;max-height:520px}
body::-webkit-scrollbar{width:3px}body::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

.header{padding:16px 18px 12px;display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;flex-shrink:0}
.header h1{font-size:18px;font-weight:800;flex:1}
.gear{background:none;border:none;font-size:15px;cursor:pointer;padding:4px;border-radius:6px;opacity:0.5;color:var(--text)}
.gear:hover{opacity:1;background:var(--bg2)}

.search-box{padding:0 18px 14px;display:flex;gap:8px}
.search-box input{flex:1;background:var(--bg2);border:2px solid var(--bg3);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text3)}

.modes{padding:0 18px 14px;display:flex;gap:6px}
.mode-btn{flex:1;padding:10px 8px;border-radius:10px;border:1.5px solid var(--bg3);background:var(--bg2);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center;line-height:1.3}
.mode-btn:hover{border-color:var(--accent);color:var(--text)}
.mode-btn.active{border-color:var(--accent);background:rgba(99,102,241,0.12);color:var(--accent2)}
.mode-label{display:block;font-size:10px;color:var(--text3);margin-top:2px;font-weight:400}

.state{padding:40px 24px;text-align:center}
.state-icon{font-size:36px;margin-bottom:10px}
.state-text{font-size:14px;font-weight:600;margin-bottom:4px}
.state-sub{font-size:12px;color:var(--text3);line-height:1.5}
.spinner{width:32px;height:32px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;margin:0 auto 14px;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.go-banner{margin:0 18px 12px;padding:14px 16px;border-radius:14px;background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);cursor:pointer;transition:all 0.15s;display:none;position:relative;overflow:hidden}
.go-banner:hover{transform:scale(1.01);box-shadow:0 8px 30px rgba(34,197,94,0.3)}
.go-banner:active{transform:scale(0.99)}
.go-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.go-tag{font-size:10px;font-weight:700;background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:6px;color:white;text-transform:uppercase;letter-spacing:0.5px}
.go-price{font-size:22px;font-weight:900;color:white}
.go-title{font-size:12px;color:rgba(255,255,255,0.85);line-height:1.3;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.go-mall{font-size:11px;color:rgba(255,255,255,0.65);margin-top:4px;display:flex;align-items:center;gap:6px}
.trust-dots{display:inline-flex;gap:2px}
.trust-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.25)}
.trust-dot.on{background:white}
.go-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:24px;color:rgba(255,255,255,0.7)}

.others-label{padding:6px 18px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;display:none}
.others{padding:0 18px 14px}
.other-item{display:flex;align-items:center;gap:10px;padding:10px;margin-bottom:5px;background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;cursor:pointer;transition:all 0.15s;text-decoration:none;color:inherit}
.other-item:hover{border-color:var(--accent);background:rgba(99,102,241,0.05);transform:translateX(2px)}
.other-img{width:36px;height:36px;border-radius:8px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.other-info{flex:1;min-width:0}
.other-title{font-size:11px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.other-mall{font-size:10px;color:var(--text3);margin-top:2px}
.other-price{font-size:14px;font-weight:800;flex-shrink:0;white-space:nowrap}

.setup-btn{background:var(--accent);color:white;border:none;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px}
.setup-btn:hover{background:var(--accent2)}
.link{display:block;color:var(--accent2);font-size:11px;text-decoration:none;margin-top:8px}

@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:slideUp 0.25s ease-out forwards;opacity:0}
</style>
</head>
<body>
<div class="header">
  <div class="logo">GO</div>
  <h1>SSADA</h1>
  <button class="gear" id="gearBtn">&#9881;</button>
</div>

<div class="search-box">
  <input type="text" id="q" placeholder="뭐 찾으세요? (ex: 에어팟 프로 2)" autofocus />
</div>

<div class="modes">
  <button class="mode-btn active" data-mode="balanced" id="modeBalanced">
    &#x1F3AF; 추천<span class="mode-label">신뢰+가격 균형</span>
  </button>
  <button class="mode-btn" data-mode="cheapest" id="modeCheap">
    &#x1F4B0; 최저가<span class="mode-label">무조건 가장 싼</span>
  </button>
  <button class="mode-btn" data-mode="trusted" id="modeTrust">
    &#x1F6E1; 정품안심<span class="mode-label">대형몰 최저가</span>
  </button>
</div>

<div id="initialState" class="state">
  <div class="state-icon">&#x1F50D;</div>
  <p class="state-sub">사고 싶은 상품을 입력하면<br>가장 싼 곳으로 바로 데려갈게요</p>
</div>

<div id="loadingState" class="state" style="display:none">
  <div class="spinner"></div>
  <p class="state-text">찾는 중...</p>
</div>

<div id="apiKeyState" class="state" style="display:none">
  <div class="state-icon">&#x1F511;</div>
  <p class="state-text">Naver API Key 필요</p>
  <p class="state-sub">무료로 1분이면 발급 가능</p>
  <button class="setup-btn" id="setupBtn">설정하기</button>
  <a class="link" href="https://developers.naver.com/apps/#/register?api=search" target="_blank">Naver Developers &rarr;</a>
</div>

<div id="errorState" class="state" style="display:none">
  <div class="state-icon">&#x26A0;</div>
  <p class="state-text" id="errMsg">오류</p>
  <button class="setup-btn" id="retryBtn" style="background:var(--bg3)">다시 시도</button>
</div>

<div id="noResults" class="state" style="display:none">
  <div class="state-icon">&#x1F614;</div>
  <p class="state-text">검색 결과가 없어요</p>
  <p class="state-sub">다른 검색어로 시도해보세요</p>
</div>

<div id="goBanner" class="go-banner"></div>
<div id="othersLabel" class="others-label">다른 옵션</div>
<div id="others" class="others"></div>

<script src="popup.js"></script>
</body>
</html>
